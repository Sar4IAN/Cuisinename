<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUX AMIS 料理通し名</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1208;
  --paper: #faf7f2;
  --cream: #fff8ee;
  --gold: #d4930a;
  --gold-light: #f0b830;
  --gold-pale: #fff8e0;
  --sage: #3a7a50;
  --sage-pale: #e4f5eb;
  --rust: #c05a30;
  --navy: #2a4a7a;
  --coral: #e8624a;
  --teal: #2a8a80;
  --lavender: #7a5ab8;
  --border: #e8ddc8;
  --shadow: rgba(26,18,8,.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--paper); min-height: 100vh; }
body { font-family: 'DM Sans','Noto Sans JP',sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
body::before { content:''; position:fixed; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); z-index:100; }

.header { padding:28px 24px 0; max-width:660px; margin:0 auto; display:flex; align-items:flex-start; justify-content:space-between; }
.logo { font-family:'Playfair Display',serif; font-size:10px; font-style:italic; letter-spacing:.12em; color:var(--gold); text-transform:uppercase; margin-bottom:4px; }
.title { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; color:var(--ink); letter-spacing:-.02em; }
.title em { font-style:italic; color:var(--gold); }

.tabs { max-width:660px; margin:22px auto 0; padding:0 24px; display:flex; gap:2px; border-bottom:1.5px solid var(--border); }
.tab { padding:8px 18px 10px; font-size:12px; font-weight:500; letter-spacing:.06em; color:#8a7a60; cursor:pointer; border:none; background:none; font-family:'DM Sans',sans-serif; position:relative; transition:color .2s; }
.tab::after { content:''; position:absolute; bottom:-1.5px; left:0; right:0; height:2px; background:var(--gold); transform:scaleX(0); transition:transform .25s cubic-bezier(.4,0,.2,1); }
.tab.active { color:var(--gold); font-weight:600; }
.tab.active::after { transform:scaleX(1); }

.filter-wrap { max-width:660px; margin:0 auto; padding:16px 24px 0; display:flex; gap:6px; flex-wrap:wrap; }
.pill { padding:4px 12px; border-radius:100px; border:1px solid var(--border); font-size:11px; font-weight:500; color:#8a7a60; cursor:pointer; transition:all .18s; background:transparent; font-family:'DM Sans',sans-serif; white-space:nowrap; }
.pill:hover { border-color:var(--gold); color:var(--gold); }
.pill.active { background:var(--gold); border-color:var(--gold); color:#fff; }

.main { max-width:660px; margin:0 auto; padding:24px 24px 80px; }

/* CARD */
.scene { perspective:1200px; margin-bottom:20px; user-select:none; height:280px; filter:drop-shadow(0 8px 32px var(--shadow)); }
.card-shell { width:100%; height:100%; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.card { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .65s cubic-bezier(.4,0,.2,1); }
.card.flipped { transform:rotateY(180deg); }
.card-face { position:absolute; inset:0; border-radius:16px; backface-visibility:hidden; -webkit-backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 28px; overflow:hidden; }
.card-front { background:var(--cream); border:1px solid var(--border); }
.card-front::before { content:''; position:absolute; inset:10px; border:1px solid rgba(212,147,10,.2); border-radius:10px; pointer-events:none; }
.card-front::after { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--gold),transparent); border-radius:16px 16px 0 0; }
.card-back { background:var(--ink); border:none; transform:rotateY(180deg); }
.card-back::after { content:''; position:absolute; inset:10px; border:1.5px solid rgba(255,255,255,.12); border-radius:10px; pointer-events:none; }

/* Category colors for card-back */
.card-back.cat-entree  { background:#2e5d4b; }
.card-back.cat-fish    { background:#1e3d5c; }
.card-back.cat-meat    { background:#5c2e1e; }
.card-back.cat-amuse   { background:#3d2e5c; }
.card-back.cat-inter   { background:#2e4a3d; }

/* Front content */
.front-cat-tag { position:absolute; top:18px; left:18px; font-size:9px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; padding:3px 10px; border-radius:100px; }
.front-cat-tag.cat-entree  { background:#e8f0eb; color:#2a4a35; border:1px solid #b0d0bc; }
.front-cat-tag.cat-fish    { background:#e8edf5; color:#1a3060; border:1px solid #a0b4d8; }
.front-cat-tag.cat-meat    { background:#fdeee8; color:#7a2a18; border:1px solid #d4a898; }
.front-cat-tag.cat-amuse   { background:#f0e8f5; color:#4a1a6a; border:1px solid #c4a0d8; }
.front-cat-tag.cat-inter   { background:#e8f5eb; color:#1a4a2a; border:1px solid #a0d0b0; }

.front-dish { font-family:'Playfair Display',serif; font-size:17px; font-style:italic; font-weight:400; color:var(--ink); line-height:1.5; text-align:center; margin-bottom:16px; }
.front-hint { font-size:11px; color:#a09070; letter-spacing:.1em; text-transform:uppercase; }

/* Back content */
.back-label { font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.4); margin-bottom:14px; }
.back-code { font-family:'Playfair Display',serif; font-size:52px; font-weight:700; font-style:italic; color:#fff; line-height:1; text-align:center; margin-bottom:10px; letter-spacing:.01em; }
.back-silver { font-size:13px; color:rgba(255,255,255,.6); letter-spacing:.08em; font-family:'Noto Sans JP',sans-serif; margin-bottom:6px; }
.back-dish-small { font-size:11px; color:rgba(255,255,255,.35); text-align:center; font-style:italic; font-family:'Playfair Display',serif; line-height:1.5; }

/* NAV */
.card-mode-row { display:flex; gap:8px; margin-bottom:14px; }
.card-mode-btn { flex:1; padding:8px 14px; border-radius:8px; border:1.5px solid var(--border); background:transparent; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:#8a7a60; cursor:pointer; transition:all .2s; text-align:center; }
.card-mode-btn:hover { border-color:var(--gold); color:var(--gold); }
.card-mode-btn.active { background:var(--gold); border-color:var(--gold); color:#fff; }

.nav { display:flex; align-items:center; gap:16px; }
.nav-arrows { display:flex; gap:8px; }
.nav-btn { width:44px; height:44px; border-radius:50%; border:1.5px solid var(--border); background:var(--cream); cursor:pointer; font-size:16px; color:#8a7a60; display:flex; align-items:center; justify-content:center; transition:all .2s; font-family:serif; }
.nav-btn:hover:not(:disabled) { border-color:var(--gold); color:var(--gold); background:var(--gold-pale); }
.nav-btn:disabled { opacity:.25; cursor:default; }
.nav-progress { flex:1; }
.progress-bar { height:2px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:6px; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); }
.progress-label { font-size:11px; color:#a09070; letter-spacing:.08em; text-align:center; }

/* GRID */
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.grid-card { background:var(--cream); border:1px solid var(--border); border-radius:12px; padding:16px 14px; cursor:pointer; transition:all .22s cubic-bezier(.2,.8,.2,1); position:relative; overflow:hidden; }
.grid-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; opacity:0; transition:opacity .2s; }
.grid-card.cat-entree::before { background:linear-gradient(90deg,var(--sage),#6ab88a); }
.grid-card.cat-fish::before   { background:linear-gradient(90deg,var(--navy),#5a8ac8); }
.grid-card.cat-meat::before   { background:linear-gradient(90deg,var(--rust),#e88a6a); }
.grid-card.cat-amuse::before  { background:linear-gradient(90deg,var(--lavender),#b08ae8); }
.grid-card.cat-inter::before  { background:linear-gradient(90deg,var(--teal),#5ab8b0); }
.grid-card:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow:0 6px 20px var(--shadow); }
.grid-card:hover::before { opacity:1; }
.grid-code { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; font-style:italic; color:var(--gold); line-height:1; margin-bottom:5px; }
.grid-dish { font-family:'Playfair Display',serif; font-size:11px; font-style:italic; color:var(--ink); line-height:1.4; margin-bottom:5px; }
.grid-silver { font-size:10px; color:#8a7a60; letter-spacing:.04em; }
.grid-cat-badge { display:inline-block; font-size:8px; letter-spacing:.12em; text-transform:uppercase; margin-top:6px; padding:2px 7px; border-radius:100px; }
.grid-cat-badge.cat-entree { background:#e8f0eb; color:#2a4a35; }
.grid-cat-badge.cat-fish   { background:#e8edf5; color:#1a3060; }
.grid-cat-badge.cat-meat   { background:#fdeee8; color:#7a2a18; }
.grid-cat-badge.cat-amuse  { background:#f0e8f5; color:#4a1a6a; }
.grid-cat-badge.cat-inter  { background:#e8f5eb; color:#1a4a2a; }

/* QUIZ */
.quiz-counter { font-size:12px; color:#a09070; letter-spacing:.1em; text-align:center; margin-bottom:20px; font-weight:500; }
.quiz-card { background:var(--cream); border:1px solid var(--border); border-radius:16px; padding:40px 28px 32px; text-align:center; margin-bottom:16px; position:relative; overflow:hidden; box-shadow:0 4px 24px var(--shadow); }
.quiz-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.quiz-prompt { font-size:10px; font-weight:500; letter-spacing:.2em; text-transform:uppercase; color:#a09070; margin-bottom:18px; }
.quiz-big { font-family:'Playfair Display',serif; font-size:52px; font-weight:700; font-style:italic; color:var(--gold); line-height:1.1; margin-bottom:8px; }
.quiz-big-dish { font-family:'Playfair Display',serif; font-size:18px; font-style:italic; color:var(--ink); line-height:1.5; }
.quiz-cat-label { display:inline-block; font-size:10px; letter-spacing:.15em; text-transform:uppercase; padding:3px 12px; border-radius:100px; margin-top:10px; }
.quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.quiz-opt { padding:14px 10px; border:1.5px solid var(--border); border-radius:10px; background:var(--cream); font-family:'Playfair Display',serif; font-size:16px; font-style:italic; color:var(--ink); cursor:pointer; transition:all .2s; text-align:center; touch-action:manipulation; -webkit-tap-highlight-color:transparent; outline:none; }
.quiz-opt:hover:not(:disabled) { border-color:var(--teal); background:#e8f7f5; transform:translateY(-2px); box-shadow:0 4px 12px rgba(42,138,128,.15); }
.quiz-opt:disabled { cursor:default; }
.quiz-opt.correct { border-color:var(--sage); background:var(--sage-pale); color:var(--sage); font-weight:700; animation:correctBounce .5s cubic-bezier(.34,1.56,.64,1) both; }
.quiz-opt.wrong { border-color:#c0504a; background:#fdf0ef; color:#8b2a2a; animation:wrongShake .4s ease both; }
.quiz-opt.dim { opacity:.2; pointer-events:none; }
.quiz-next { width:100%; padding:15px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--teal),var(--sage)); color:#fff; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; cursor:pointer; letter-spacing:.06em; transition:all .2s; display:none; }
.quiz-next:hover { background:linear-gradient(135deg,var(--gold),var(--coral)); transform:translateY(-1px); box-shadow:0 6px 20px rgba(212,147,10,.25); }
.quiz-next.show { display:block; animation:fadeUp .3s ease both; }

/* Result */
.quiz-result { text-align:center; padding:48px 24px; background:var(--cream); border:1px solid var(--border); border-radius:16px; box-shadow:0 4px 24px var(--shadow); margin-bottom:16px; }
.result-circle { width:120px; height:120px; border-radius:50%; border:2px solid var(--gold); display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto 24px; background:var(--gold-pale); }
.result-num { font-family:'Playfair Display',serif; font-size:40px; font-weight:700; color:var(--gold); line-height:1; }
.result-denom { font-size:12px; color:#a09070; margin-top:2px; }
.result-msg { font-family:'Playfair Display',serif; font-size:22px; font-style:italic; color:var(--ink); margin-bottom:8px; }
.result-sub { font-size:13px; color:#8a7a60; margin-bottom:28px; line-height:1.7; }
.quiz-wrong-ans { position:relative; margin-top:16px; padding:10px 24px; border-radius:100px; font-size:16px; font-weight:700; font-family:'Playfair Display',serif; font-style:italic; color:#fff; background:rgba(192,80,74,.9); transform:translateY(20px); opacity:0; transition:all .3s .2s; }

#particles { position:fixed; inset:0; pointer-events:none; z-index:9999; overflow:hidden; }
.particle { position:absolute; border-radius:50%; animation:particleFly var(--dur) ease-out forwards; }
@keyframes particleFly { 0%{transform:translate(0,0) scale(1);opacity:1;} 100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;} }
.correct-flash { position:fixed; inset:0; background:radial-gradient(ellipse at center,rgba(196,146,42,.2) 0%,transparent 70%); pointer-events:none; z-index:9998; opacity:0; animation:flash .6s ease both; }
@keyframes flash { 0%{opacity:0;} 30%{opacity:1;} 100%{opacity:0;} }
@keyframes correctBounce { 0%{transform:scale(.9);} 60%{transform:scale(1.06);} 100%{transform:scale(1);} }
@keyframes wrongShake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-4px);} 80%{transform:translateX(3px);} }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:none;} }
@keyframes cardReveal { from{opacity:0;transform:translateY(20px) scale(.97);} to{opacity:1;transform:none;} }
.card-reveal { animation:cardReveal .45s cubic-bezier(.2,.8,.2,1) both; }
.hidden { display:none !important; }

@media (max-width:480px) {
  .main { padding:20px 16px 80px; }
  .header { padding:20px 16px 0; }
  .grid { grid-template-columns:1fr 1fr; gap:8px; }
  .quiz-opts { grid-template-columns:1fr; }
  .quiz-big { font-size:38px; }
  .back-code { font-size:38px; }
}
</style>
</head>
<body>
<div id="particles"></div>

<header class="header">
  <div>
    <div class="logo">AUX AMIS · Solamachi</div>
    <div class="title">料理 <em>Noms</em></div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('card',this)">フラッシュカード</button>
  <button class="tab" onclick="switchTab('grid',this)">一覧</button>
  <button class="tab" onclick="switchTab('quiz',this)">クイズ</button>
</div>

<div class="filter-wrap" id="filter-wrap"></div>

<div class="main">
  <!-- CARD -->
  <div id="mode-card">
    <div class="card-mode-row">
      <button class="card-mode-btn active" onclick="setCardMode('dish',this)">表：料理名　裏：通し名</button>
      <button class="card-mode-btn" onclick="setCardMode('code',this)">表：通し名　裏：料理名</button>
    </div>
    <div class="card-mode-row">
      <button class="card-mode-btn active" onclick="setOrderMode('order',this)">順番</button>
      <button class="card-mode-btn" onclick="setOrderMode('random',this)">ランダム</button>
    </div>
    <div class="scene" id="scene">
      <div class="card-shell" id="card-shell">
        <div class="card" id="card">
          <div class="card-face card-front" id="card-front"></div>
          <div class="card-face card-back" id="card-back"></div>
        </div>
      </div>
    </div>
    <div class="nav">
      <div class="nav-arrows">
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">←</button>
        <button class="nav-btn" id="btn-next" onclick="navigate(1)">→</button>
      </div>
      <div class="nav-progress">
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="progress-label" id="prog-label"></div>
      </div>
    </div>
  </div>

  <!-- GRID -->
  <div id="mode-grid" class="hidden">
    <div class="grid" id="grid-body"></div>
  </div>

  <!-- QUIZ -->
  <div id="mode-quiz" class="hidden">
    <div class="quiz-counter" id="quiz-counter"></div>
<div class="card-mode-row" style="margin-bottom:14px;">
  <button class="card-mode-btn active" id="qmb-input" onclick="setQuizMode('input',this)">記述式のみ</button>
  <button class="card-mode-btn" id="qmb-mixed" onclick="setQuizMode('mixed',this)">記述式＋選択式</button>
</div>
<div id="quiz-q"></div>
    <div class="quiz-opts" id="quiz-opts"></div>
    <div id="quiz-input-wrap" class="hidden" style="margin-bottom:12px;">
      <input id="quiz-input" type="text" placeholder="通し名を入力..." style="width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;background:var(--cream);margin-bottom:8px;" oninput="this.style.borderColor='var(--gold)'" onkeydown="if(event.key==='Enter')submitInput()">
      <button id="quiz-submit-btn" onclick="submitInput()" style="width:100%;padding:13px;border-radius:10px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;letter-spacing:.06em;transition:all .2s;" onmouseover="this.style.background='var(--gold)';this.style.color='#fff'" onmouseout="this.style.background='transparent';this.style.color='var(--gold)'">回答する</button>
    </div>
    <button class="quiz-next" id="quiz-next" onclick="nextQuiz()">次へ　→</button>
  </div>
</div>

<script>
var DISHES = [
  // 前菜
  {code:'Pate カルパッチョ', dish:'埼玉県・吉田豚のパテ・ド・カンパーニュとサーモンのマリネ 黒オリーブのソースの盛り合わせ', cat:'entree', catLabel:'前菜', silver:'HF / HC'},
  {code:'Blinis',      dish:'サーモンのマリネとじゃがいものブリニ セルベルドカニュソース', cat:'entree', catLabel:'前菜',       silver:'HF / HC'},
  {code:'Crabe',       dish:'ズワイガニのガトー仕立て 淡路島産 フルーツ玉ねぎのクーリ', cat:'entree', catLabel:'前菜', silver:'GQ'},
  {code:'ズワイ',    dish:'鳥取県産 ズワイガニ・にんじんのムースとコンソメジュレ キャビア添え', cat:'entree', catLabel:'前菜', silver:'GQ'},
  {code:'Composition', dish:'ニンジンのムースとコンソメジュレ、オマールエビのコンポジション キャビア添え', cat:'entree', catLabel:'前菜', silver:'GQ'},
  {code:'レバームース', dish:'鶏白レバームース 金柑のジャム添え',                       cat:'entree', catLabel:'前菜',       silver:'HF / HC'},
  {code:'1/2 FG',      dish:'ハンガリー産 フォアグラテリーヌ 金柑のジャム ブリオッシュ添え', cat:'entree', catLabel:'前菜', silver:'HF / HC'},
  // 中間料理
  {code:'Ballotine',   dish:'健味鶏のバロティーヌ トリュフヴィネグレットソース',         cat:'inter',  catLabel:'中間料理',  silver:'HF / HC'},
  {code:'ローストビーフ', dish:'黒毛和牛のローストビーフ クルミのヴィネグレットソース',  cat:'inter',  catLabel:'中間料理',  silver:'HF / HC'},
  // 魚料理
  {code:'1/2 Poisson', dish:'豊洲より本日の鮮魚のポワレ',                             cat:'fish',   catLabel:'魚料理',    silver:'SQ / HC'},
  {code:'アマダイ',    dish:'山口県萩産 甘ダイのうろこ焼き オマールエビのソース',       cat:'fish',   catLabel:'魚料理',    silver:'SQ / HF'},
  {code:'アユ',        dish:'長野県産 天龍鮎のコンフィ ラヴィゴットソース',             cat:'fish',   catLabel:'魚料理',    silver:'HF / HC'},
  // 肉料理
  {code:'Steak',       dish:'US産 ブラックアンガス牛 内モモのステーキ オニオンソース',  cat:'meat',   catLabel:'肉料理',    silver:'LA / VF'},
  {code:'Yoshida',     dish:'オザミといえば!! 吉田豚肩ロース肉のロースト オニオンソース', cat:'meat', catLabel:'肉料理',    silver:'LA / VF'},
  {code:'Canard',      dish:'鴨ムネ肉のロースト オレンジソース',                        cat:'meat',   catLabel:'肉料理',    silver:'LA / VF'},
  {code:"Selle d'Agneau", dish:'ニュージーランド産 仔羊鞍下肉のロースト ジュのソース', cat:'meat',   catLabel:'肉料理',    silver:'LA / VF'},
  {code:'Filet de boeuf', dish:'国産牛フィレ肉のポワレ エシャロットソース',             cat:'meat',   catLabel:'肉料理',    silver:'LA / VF'},
  {code:'黒豚',        dish:'フランス産 ビゴール黒豚 肩ロースのポワレ マスタードソース', cat:'meat',  catLabel:'肉料理',    silver:'LA / VF'},
  {code:'Noix de boeuf', dish:'国産黒毛和牛内モモ肉のロースト 赤ワインソース',          cat:'meat',   catLabel:'肉料理',    silver:'LA / VF'},
  {code:'Chevreuil',   dish:'北海道産 エゾ鹿内モモ肉のロースト ポワヴラードソース',     cat:'meat',   catLabel:'肉料理',    silver:'LA / VF'},
  {code:'1/2Pigeonneau', dish:'フランス・ラカン産 仔鳩1/2羽のロースト ジュと赤ワインのソース', cat:'meat', catLabel:'肉料理', silver:'LA / VF'},
];

var CATS = [
  {key:'all',    label:'すべて'},
  {key:'entree', label:'前菜'},
  {key:'inter',  label:'中間料理'},
  {key:'fish',   label:'魚料理'},
  {key:'meat',   label:'肉料理'},
];

var curTab='card', curFilter='all', curCardMode='dish', curOrderMode='order', quizInputMode='choice', quizMode='input';
var pool=[], idx=0, flipped=false;
var quizPool=[], quizIdx=0, quizCorrect=0, quizAnswered=false, quizWrong=[], isRetryMode=false;

function buildPool(){
  var base = curFilter==='all' ? DISHES.slice() : DISHES.filter(function(d){return d.cat===curFilter;});
  pool = curOrderMode==='random' ? shuffle(base) : base;
}

function shuffle(arr){
  arr=arr.slice();
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}

// ── INIT ──
function initFilters(){
  var wrap=document.getElementById('filter-wrap');
  CATS.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='pill'+(c.key==='all'?' active':'');
    btn.textContent=c.label;
    btn.onclick=function(){
      curFilter=c.key;
      document.querySelectorAll('.pill').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      idx=0; flipped=false;
      buildPool();
      if(curTab==='quiz') initQuiz();
      else if(curTab==='grid') renderGrid();
      else renderCard();
    };
    wrap.appendChild(btn);
  });
}

function switchTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  ['card','grid','quiz'].forEach(function(m){
    document.getElementById('mode-'+m).classList.toggle('hidden',m!==tab);
  });
  idx=0; flipped=false;
  buildPool();
  if(tab==='quiz') initQuiz();
  else if(tab==='grid') renderGrid();
  else { renderCard(); initCardEvents(); }
}

function setCardMode(mode,el){
  curCardMode=mode;
  document.querySelectorAll('.card-mode-row:first-child .card-mode-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  idx=0; flipped=false; buildPool(); renderCard(); initCardEvents();
}

function setOrderMode(mode,el){
  curOrderMode=mode;
  var row=el.parentElement;
  row.querySelectorAll('.card-mode-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  idx=0; flipped=false; buildPool(); renderCard(); initCardEvents();
}

// ── CARD ──
function initCardEvents(){
  var shell=document.getElementById('card-shell');
  if(!shell) return;
  shell.removeEventListener('click',flipCard);
  shell.removeEventListener('touchend',flipCard);
  shell.addEventListener('click',flipCard);
  shell.addEventListener('touchend',flipCard,{passive:false});
}

function flipCard(e){
  if(e){e.preventDefault();e.stopPropagation();}
  flipped=!flipped;
  document.getElementById('card').classList.toggle('flipped',flipped);
}

function renderCard(){
  if(!pool.length) return;
  var d=pool[idx];
  var pct=pool.length>1?Math.round((idx/(pool.length-1))*100):100;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=(idx+1)+' / '+pool.length;
  document.getElementById('btn-prev').disabled=idx===0;
  document.getElementById('btn-next').disabled=idx===pool.length-1;

  var card=document.getElementById('card');
  card.classList.remove('flipped');
  flipped=false;

  var frontEl=document.getElementById('card-front');
  var backEl=document.getElementById('card-back');
  frontEl.className='card-face card-front';
  backEl.className='card-face card-back cat-'+d.cat;

  if(curCardMode==='dish'){
    frontEl.innerHTML=
      '<div class="front-cat-tag cat-'+d.cat+'">'+d.catLabel+'</div>'+
      '<div class="front-dish">'+d.dish+'</div>'+
      '<div class="front-hint">↻ タップしてめくる</div>';
    backEl.innerHTML=
      '<div class="back-label">'+d.catLabel+'</div>'+
      '<div class="back-code">'+d.code+'</div>'+
      '<div class="back-silver">'+d.silver+'</div>'+
      '<div class="back-dish-small">'+d.dish+'</div>';
  } else {
    frontEl.innerHTML=
      '<div class="front-cat-tag cat-'+d.cat+'">'+d.catLabel+'</div>'+
      '<div class="front-dish" style="font-size:32px;font-weight:700;color:var(--gold);">'+d.code+'</div>'+
      '<div class="front-hint">↻ タップしてめくる</div>';
    backEl.innerHTML=
      '<div class="back-label">'+d.code+'</div>'+
      '<div class="back-dish-small" style="font-size:15px;color:rgba(255,255,255,.85);margin-bottom:10px;">'+d.dish+'</div>'+
      '<div class="back-silver">'+d.silver+'</div>';
  }
}

function navigate(dir){
  var card=document.getElementById('card');
  var outX=dir>0?'-120px':'120px';
  card.style.transition='transform .25s cubic-bezier(.4,0,1,1), opacity .25s ease';
  card.style.transform='translateX('+outX+') rotateY('+(dir>0?'15':'-15')+'deg) scale(.92)';
  card.style.opacity='0';
  setTimeout(function(){
    idx=Math.max(0,Math.min(pool.length-1,idx+dir));
    card.style.transition='none';
    card.style.transform='translateX('+(dir>0?'80px':'-80px')+') rotateY('+(dir>0?'-12':'12')+'deg) scale(.94)';
    card.style.opacity='0';
    renderCard();
    setTimeout(function(){
      card.style.transition='transform .4s cubic-bezier(.2,.8,.2,1), opacity .35s ease';
      card.style.transform='';
      card.style.opacity='';
      setTimeout(function(){card.style.transition='';},420);
    },30);
  },240);
}

// ── GRID ──
function renderGrid(){
  var body=document.getElementById('grid-body');
  body.innerHTML='';
  var sorted=pool.slice().sort(function(a,b){
    var catOrder={amuse:0,entree:1,inter:2,fish:3,meat:4};
    return (catOrder[a.cat]||0)-(catOrder[b.cat]||0);
  });
  sorted.forEach(function(d){
    var el=document.createElement('div');
    el.className='grid-card cat-'+d.cat;
    el.innerHTML=
      '<div class="grid-code">'+d.code+'</div>'+
      '<div class="grid-dish">'+d.dish+'</div>'+
      '<div class="grid-silver">'+d.silver+'</div>'+
      '<div class="grid-cat-badge cat-'+d.cat+'">'+d.catLabel+'</div>';
    body.appendChild(el);
  });
}

// ── QUIZ ──
function normalizeAnswer(s){
  s=s.trim();
  // 全角→半角
  s=s.replace(/[Ａ-Ｚａ-ｚ０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);});
  // スペース除去
  s=s.replace(/[\s　]/g,'');
  // 大文字化
  s=s.toUpperCase();
  // ／→/
  s=s.replace(/／/g,'/');
  return s;
}

function checkAnswer(input,correct){
  var a=normalizeAnswer(input);
  var b=normalizeAnswer(correct);
  if(a===b) return true;
  // 部分一致(前方一致)も許容
  if(b.startsWith(a)&&a.length>=2) return true;
  return false;
}

function submitInput(){
  if(quizAnswered) return;
  var d=quizPool[quizIdx];
  var dir=currentDir;
  var input=document.getElementById('quiz-input').value;
  if(!input.trim()) return;
  var correct=d.code;
  var isCorrect=checkAnswer(input,correct);
  showInputResult(isCorrect,d,dir,correct);
}

var currentDir='dish2code';

function showInputResult(isCorrect,d,dir,correct){
  quizAnswered=true;
  if(isCorrect) quizCorrect++;
  else quizWrong.push(d);

  var inputEl=document.getElementById('quiz-input');
  var submitBtn=document.getElementById('quiz-submit-btn');
  inputEl.disabled=true;
  if(submitBtn) submitBtn.style.display='none';

  // Full screen flash animation
  showResultFlash(isCorrect,correct);

  if(isRetryMode){
    setTimeout(function(){nextQuiz();},1800);
  } else {
    setTimeout(function(){
      document.getElementById('quiz-next').classList.add('show');
    },600);
  }
}

function showResultFlash(isCorrect,correct){
  // Big overlay flash
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;';
  
  var bg=document.createElement('div');
  bg.style.cssText='position:absolute;inset:0;opacity:0;transition:opacity .15s;';
  bg.style.background=isCorrect?'rgba(58,122,80,.18)':'rgba(192,80,74,.15)';
  overlay.appendChild(bg);

  var badge=document.createElement('div');
  badge.style.cssText='position:relative;font-size:72px;transform:scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1);';
  badge.textContent=isCorrect?'✓':'✗';
  overlay.appendChild(badge);

  if(!isCorrect){
    var ans=document.createElement('div');
    ans.className='quiz-wrong-ans';
    ans.textContent=correct;
    overlay.appendChild(ans);
  }

  document.body.appendChild(overlay);

  requestAnimationFrame(function(){
    bg.style.opacity='1';
    badge.style.color=isCorrect?'var(--sage)':'#c0504a';
    badge.style.transform='scale(1)';
    if(!isCorrect && overlay.querySelector('div:last-child')){
      setTimeout(function(){
        var a=overlay.querySelector('div:last-child');
        a.style.transform='translateY(0)';
        a.style.opacity='1';
      },100);
    }
  });

  if(isCorrect) fireParticles();

  setTimeout(function(){
    overlay.style.transition='opacity .3s';
    overlay.style.opacity='0';
    setTimeout(function(){overlay.remove();},350);
  },isCorrect?900:1400);
}

function setQuizMode(mode, el){
  quizMode = mode;
  document.querySelectorAll('#qmb-input,#qmb-mixed').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  quizIdx=0; quizCorrect=0; quizWrong=[]; isRetryMode=false;
  buildPool(); quizPool=shuffle(pool);
  renderQuiz();
}

function initQuiz(){
  buildPool();
  quizPool=shuffle(pool);
  quizIdx=0; quizCorrect=0; quizWrong=[]; isRetryMode=false;
  renderQuiz();
}

function renderQuiz(){
  if(quizIdx>=quizPool.length){showQuizResult();return;}
  quizAnswered=false;
  var nextBtn=document.getElementById('quiz-next');
  nextBtn.classList.remove('show');
  nextBtn.textContent='次へ　→';
  nextBtn.style.background='';
  nextBtn.onclick=nextQuiz;
  var oldRetry=document.getElementById('retry-btn');
  if(oldRetry) oldRetry.remove();

  // Reset input
  var inputWrap=document.getElementById('quiz-input-wrap');
  var inputEl=document.getElementById('quiz-input');
  if(inputEl){
    inputEl.value='';inputEl.disabled=false;
    inputEl.style.borderColor='';inputEl.style.background='';
    // Remove feedback divs
    Array.from(inputWrap.querySelectorAll('div')).forEach(function(el){el.remove();});
  }
  var submitBtn=document.getElementById('quiz-submit-btn');
  if(submitBtn) submitBtn.style.display='';
  var d=quizPool[quizIdx];
  var dir='dish2code';
  currentDir=dir;
  // Randomly choose choice or input
  quizInputMode = quizMode==='mixed' ? (Math.random()<0.5?'choice':'input') : 'input';
  var optsEl=document.getElementById('quiz-opts');
  optsEl.classList.add('hidden');
  inputWrap.classList.remove('hidden');

  document.getElementById('quiz-counter').textContent=
    (quizIdx+1)+' / '+quizPool.length+'　　正解 '+quizCorrect;

  var qEl=document.getElementById('quiz-q');
  var promptLabel='通し名を入力してください';
  qEl.innerHTML=
    '<div class="quiz-card card-reveal">'+
      '<div class="quiz-prompt">'+promptLabel+'</div>'+
      '<div class="quiz-big-dish">'+d.dish+'</div>'+
      '<span class="quiz-cat-label cat-'+d.cat+'" style="background:var(--gold-pale);color:var(--gold);border:1px solid var(--gold-dim,#d4c090);">'+d.catLabel+'</span>'+
    '</div>';

  if(quizInputMode==='choice'){
    var others=shuffle(pool.filter(function(x){return x.code!==d.code;})).slice(0,3);
    var opts=shuffle(others.concat([d]));
    var optsEl2=document.getElementById('quiz-opts');
    optsEl2.innerHTML='';
    optsEl2.style.opacity='0';
    opts.forEach(function(o){
      var btn=document.createElement('button');
      btn.className='quiz-opt';
      btn.textContent=o.code;
      btn.onclick=function(){
        if(quizAnswered) return;
        answerQuiz(o.code===d.code,btn,d,dir,optsEl2);
      };
      optsEl2.appendChild(btn);
    });
    setTimeout(function(){optsEl2.style.opacity='';},80);
  } else {
    setTimeout(function(){
      var inp=document.getElementById('quiz-input');
      if(inp) inp.focus();
    },100);
  }
}

function answerQuiz(correct,clickedBtn,d,dir,optsEl){
  if(quizAnswered||clickedBtn.classList.contains('correct')||clickedBtn.classList.contains('wrong')) return;
  quizAnswered=true;
  if(correct) quizCorrect++;
  else quizWrong.push(d);

  Array.from(optsEl.children).forEach(function(btn){
    var val=btn.textContent;
    var isCorrect=val===d.code;
    if(isCorrect) btn.classList.add('correct');
    else if(btn===clickedBtn) btn.classList.add('wrong');
    else btn.classList.add('dim');
    btn.disabled=true;
  });

  if(correct) fireParticles();

  if(isRetryMode){
    setTimeout(function(){nextQuiz();},1200);
  } else {
    document.getElementById('quiz-next').classList.add('show');
  }
}

function nextQuiz(){quizIdx++;renderQuiz();}

function showQuizResult(){
  var pct=Math.round((quizCorrect/quizPool.length)*100);
  var msg=pct===100?'Parfait !':pct>=80?'Très bien !':pct>=60?'Pas mal !':'Continuez !';
  var sub=pct===100?'全問正解です。さすがです。':pct>=80?'よくできました。苦手な料理を絞って練習しましょう。':pct>=60?'もう一息です。繰り返し練習しましょう。':'一覧で確認してから再挑戦しましょう。';

  if(isRetryMode){
    if(quizWrong.length===0){
      document.getElementById('quiz-q').innerHTML=
        '<div class="quiz-result card-reveal">'+
          '<div class="result-circle"><div class="result-num">✓</div></div>'+
          '<div class="result-msg">Parfait !</div>'+
          '<div class="result-sub">全問正解しました！</div>'+
        '</div>';
      document.getElementById('quiz-counter').textContent='全問正解';
      document.getElementById('quiz-opts').innerHTML='';
      var nb=document.getElementById('quiz-next');
      nb.textContent='再スタート';
      nb.style.background='linear-gradient(135deg,var(--teal),var(--sage))';
      nb.onclick=function(){isRetryMode=false;initQuiz();};
      nb.classList.add('show');
      fireParticles(true);
    } else {
      document.getElementById('quiz-q').innerHTML=
        '<div class="quiz-result card-reveal">'+
          '<div class="result-circle"><div class="result-num">'+quizWrong.length+'</div></div>'+
          '<div class="result-msg">もう一息！</div>'+
          '<div class="result-sub">間違えた '+quizWrong.length+' 問をもう一度やり直しましょう。</div>'+
        '</div>';
      document.getElementById('quiz-counter').textContent='やり直し';
      document.getElementById('quiz-opts').innerHTML='';
      var nb2=document.getElementById('quiz-next');
      nb2.textContent='間違えた '+quizWrong.length+' 問をやり直す';
      nb2.style.background='linear-gradient(135deg,var(--coral),var(--rust))';
      nb2.onclick=function(){
        quizPool=shuffle(quizWrong.slice());
        quizIdx=0;quizCorrect=0;quizWrong=[];
        nb2.onclick=nextQuiz;
        renderQuiz();
      };
      nb2.classList.add('show');
    }
    return;
  }

  document.getElementById('quiz-counter').textContent='結果';
  document.getElementById('quiz-q').innerHTML=
    '<div class="quiz-result card-reveal">'+
      '<div class="result-circle"><div class="result-num">'+quizCorrect+'</div><div class="result-denom">/ '+quizPool.length+'</div></div>'+
      '<div class="result-msg">'+msg+'</div>'+
      '<div class="result-sub">'+sub+'</div>'+
    '</div>';
  document.getElementById('quiz-opts').innerHTML='';
  var nextBtn=document.getElementById('quiz-next');
  nextBtn.textContent='もう一度やる';
  nextBtn.onclick=initQuiz;
  nextBtn.classList.add('show');

  if(quizWrong.length>0){
    var retryBtn=document.createElement('button');
    retryBtn.id='retry-btn';
    retryBtn.className='quiz-next show';
    retryBtn.style.marginTop='8px';
    retryBtn.style.background='linear-gradient(135deg,var(--coral),var(--rust))';
    retryBtn.textContent='間違えた '+quizWrong.length+' 問をやり直す';
    retryBtn.onclick=function(){
      quizPool=shuffle(quizWrong.slice());
      quizIdx=0;quizCorrect=0;quizWrong=[];isRetryMode=true;
      nextBtn.onclick=nextQuiz;
      renderQuiz();
    };
    nextBtn.insertAdjacentElement('afterend',retryBtn);
  }
  if(pct===100) fireParticles(true);
}

function fireParticles(big){
  var flash=document.createElement('div');
  flash.className='correct-flash';
  document.body.appendChild(flash);
  setTimeout(function(){flash.remove();},700);
  var container=document.getElementById('particles');
  var count=big?60:28;
  var colors=['#d4930a','#f0b830','#e8624a','#2a8a80','#7a5ab8','#3a7a50','#ffffff','#ffeaa0'];
  var cx=window.innerWidth/2, cy=window.innerHeight/2;
  for(var i=0;i<count;i++){
    (function(){
      var p=document.createElement('div');
      p.className='particle';
      var size=4+Math.random()*10;
      var angle=Math.random()*Math.PI*2;
      var dist=(big?220:150)+Math.random()*160;
      var dur=0.6+Math.random()*0.7;
      var color=colors[Math.floor(Math.random()*colors.length)];
      p.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(cx+(Math.random()-.5)*80)+'px;top:'+(cy+(Math.random()-.5)*80)+'px;background:'+color+';--tx:'+(Math.cos(angle)*dist)+'px;--ty:'+(Math.sin(angle)*dist-80)+'px;--dur:'+dur+'s;margin:-'+size/2+'px;';
      if(Math.random()<0.3) p.style.borderRadius='2px';
      container.appendChild(p);
      setTimeout(function(){p.remove();},dur*1000+100);
    })();
  }
}

initFilters();
buildPool();
renderCard();
initCardEvents();
</script>
</body>
</html>
